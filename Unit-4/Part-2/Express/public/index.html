<!DOCTYPE html>
<html>
<head>
    <title>Task Manager Integration</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f7; padding: 40px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        form { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-delete { background: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h2>Task Manager</h2>
    
    <form id="taskForm">
        <input type="hidden" id="taskId">
        <input type="text" id="title" placeholder="New Task..." required>
        <select id="status">
            <option value="Pending">Pending</option>
            <option value="Completed">Completed</option>
        </select>
        <button type="submit">Save Task</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="taskTable"></tbody>
    </table>
</div>

<script>
    const form = document.getElementById('taskForm');
    const taskTable = document.getElementById('taskTable');

    // Load tasks as soon as the page opens
    window.onload = loadTasks;

    // Fetch data from our Express backend
    async function loadTasks() {
        const res = await fetch('/tasks');
        const tasks = await res.json();
        
        taskTable.innerHTML = '';
        tasks.forEach(task => {
            taskTable.innerHTML += `
                <tr>
                    <td>${task.title}</td>
                    <td><b>${task.status}</b></td>
                    <td>
                        <button onclick="editTask('${task._id}','${task.title}','${task.status}')">Edit</button>
                        <button class="btn-delete" onclick="deleteTask('${task._id}')">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    // Handle the creation and updating of tasks
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const id = document.getElementById('taskId').value;
        const title = document.getElementById('title').value;
        const status = document.getElementById('status').value;
        
        if (id) {
            // If an ID exists, we are updating (PUT)
            await fetch(`/tasks/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title, status })
            });
        } else {
            // If no ID exists, we are creating (POST)
            await fetch(`/tasks`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title, status })
            });
        }
        
        form.reset();
        document.getElementById('taskId').value = '';
        loadTasks(); // Refresh the list
    });

    // Populate the form for editing
    function editTask(id, title, status) {
        document.getElementById('taskId').value = id;
        document.getElementById('title').value = title;
        document.getElementById('status').value = status;
    }

    // Tell the backend to delete a task
    async function deleteTask(id) {
        if(confirm('Are you sure you want to delete this task?')) {
            await fetch(`/tasks/${id}`, { method: 'DELETE' });
            loadTasks(); // Refresh the list
        }
    }
</script>

</body>
</html>
