<div class="container" style="max-width: 600px; margin: 20px auto; font-family: sans-serif;">
  <h2>About Our Team</h2>
  <p>This data is managed by a strongly-typed Generic Class Repository.</p>

  <button 
    (click)="addNewMember()" 
    style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 20px;">
    + Hire New Member
  </button>

  <div style="display: grid; gap: 15px;">
    <div *ngFor="let member of members" style="background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;">
      
      <div>
        <h3 style="margin: 0 0 5px 0; color: #333;">{{ member.name }}</h3>
        <p style="margin: 0; color: #666; font-size: 14px;">
          <strong>Role:</strong> {{ member.role }} <br>
          <strong>Expertise:</strong> {{ member.expertise }}
        </p>
      </div>

      <button 
        (click)="removeMember(member.id)" 
        style="padding: 6px 12px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">
        Remove
      </button>

    </div>
  </div>
  
  <p style="margin-top: 20px; font-size: 12px; color: #888;">
    <em>*Open your browser's Developer Tools Console (F12) and click the buttons above to see the custom `@LogAction` Decorator in action!</em>
  </p>
</div>
